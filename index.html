<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <title>To Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>📌 Minha To-Do List</h1>

    <div class="input-area">
      <input id="taskInput" placeholder="Digite uma nova tarefa..." />
      <button onclick="addTask()">Adicionar</button>
    </div>

    <div class="section">
      <h2>Pendentes</h2>
      <div id="pending"></div>
    </div>

    <div class="section">
      <h2>Concluídas</h2>
      <div id="done"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>

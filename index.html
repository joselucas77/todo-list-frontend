<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>To Do List</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="container">

    <header class="header">
      <h1>📋 To Do List</h1>

      <button id="newTaskButton" class="primary-button">
        + Nova tarefa
      </button>
    </header>

    <section class="toolbar">

      <input id="searchInput" type="text" placeholder="Pesquisar tarefas..." />

      <select id="filterSelect">

        <option value="all">
          Todas
        </option>

        <option value="pending">
          Pendentes
        </option>

        <option value="completed">
          Concluídas
        </option>

      </select>

    </section>

    <section id="tasks" class="tasks">
    </section>

  </main>

  <!-- Modal -->

  <div id="modalOverlay" class="modal-overlay hidden">

    <div class="modal">

      <h2 id="modalTitle">
        Nova tarefa
      </h2>

      <input id="taskInput" type="text" placeholder="Digite o nome da tarefa..." />

      <div class="modal-actions">

        <button id="cancelButton" class="secondary-button">

          Cancelar

        </button>

        <button id="saveButton" class="primary-button">

          Salvar

        </button>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
